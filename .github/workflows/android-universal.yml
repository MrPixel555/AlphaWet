name: Build Universal Android APK

on:
  push:
    branches: ['main']
  pull_request:
    branches: ['main']
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Show Flutter version
        run: flutter --version

      - name: Generate fresh Android scaffold
        run: |
          rm -rf /tmp/aw_manager_ui
          flutter create \
            --platforms=android \
            --project-name aw_manager_ui \
            --org com.awmanager.ui \
            /tmp/aw_manager_ui

      - name: Overlay repository source onto generated project
        run: |
          rsync -av \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='android' \
            ./ /tmp/aw_manager_ui/

      - name: Install dependencies
        working-directory: /tmp/aw_manager_ui
        run: flutter pub get

      - name: Static analysis
        working-directory: /tmp/aw_manager_ui
        run: flutter analyze

      - name: Build universal release APK
        working-directory: /tmp/aw_manager_ui
        run: flutter build apk --release

      - name: Collect APK
        run: |
          mkdir -p dist
          cp /tmp/aw_manager_ui/build/app/outputs/flutter-apk/app-release.apk \
            dist/aw-manager-ui-universal-release.apk

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: aw-manager-ui-universal-apk
          path: dist/aw-manager-ui-universal-release.apk
          if-no-files-found: error
