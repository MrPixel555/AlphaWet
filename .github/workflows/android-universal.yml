name: Build AlphaWet Android APK

on:
  push:
    branches: ['main']
  pull_request:
    branches: ['main']
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    env:
      BUILD_ROOT: /tmp/alphawet
      AW_INCLUDE_X86_64: '1'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Show tool versions
        run: |
          flutter --version
          dart --version
          java -version

      - name: Validate required signing secrets exist
        env:
          AW_ANDROID_KEYSTORE_BASE64: ${{ secrets.AW_ANDROID_KEYSTORE_BASE64 }}
          AW_ANDROID_KEYSTORE_PASSWORD: ${{ secrets.AW_ANDROID_KEYSTORE_PASSWORD }}
          AW_ANDROID_KEY_PASSWORD: ${{ secrets.AW_ANDROID_KEY_PASSWORD }}
          AW_ANDROID_KEY_ALIAS: ${{ secrets.AW_ANDROID_KEY_ALIAS }}
          AW_EXPECTED_SIGNING_CERT_SHA256: ${{ secrets.AW_EXPECTED_SIGNING_CERT_SHA256 }}
        run: |
          test -n "$AW_ANDROID_KEYSTORE_BASE64"
          test -n "$AW_ANDROID_KEYSTORE_PASSWORD"
          test -n "$AW_ANDROID_KEY_ALIAS"
          test -n "$AW_EXPECTED_SIGNING_CERT_SHA256"

      - name: Prepare Android project for CI
        env:
          AW_EXPECTED_SIGNING_CERT_SHA256: ${{ secrets.AW_EXPECTED_SIGNING_CERT_SHA256 }}
        run: bash tool/ci_prepare_android_project.sh "$GITHUB_WORKSPACE" "$BUILD_ROOT"

      - name: Restore release keystore
        shell: bash
        env:
          AW_ANDROID_KEYSTORE_BASE64: ${{ secrets.AW_ANDROID_KEYSTORE_BASE64 }}
        run: |
          mkdir -p "$RUNNER_TEMP/alphawet-signing"
          printf '%s' "$AW_ANDROID_KEYSTORE_BASE64" | base64 --decode > "$RUNNER_TEMP/alphawet-signing/release.jks"
          test -s "$RUNNER_TEMP/alphawet-signing/release.jks"

      - name: Validate keystore, alias, and resolve working key password
        shell: bash
        env:
          AW_ANDROID_KEYSTORE_PASSWORD: ${{ secrets.AW_ANDROID_KEYSTORE_PASSWORD }}
          AW_ANDROID_KEY_PASSWORD: ${{ secrets.AW_ANDROID_KEY_PASSWORD }}
          AW_ANDROID_KEY_ALIAS: ${{ secrets.AW_ANDROID_KEY_ALIAS }}
        run: |
          KEYSTORE_PATH="$RUNNER_TEMP/alphawet-signing/release.jks"

          keytool -list -v \
            -keystore "$KEYSTORE_PATH" \
            -storepass "$AW_ANDROID_KEYSTORE_PASSWORD" \
            -alias "$AW_ANDROID_KEY_ALIAS" >/dev/null

          PROBE_DIR="$RUNNER_TEMP/alphawet-signing/probe"
          mkdir -p "$PROBE_DIR"
          printf 'alphawet signing probe\n' > "$PROBE_DIR/probe.txt"
          (
            cd "$PROBE_DIR"
            jar --create --file probe.jar probe.txt >/dev/null
          )

          try_sign() {
            local candidate="$1"
            jarsigner \
              -keystore "$KEYSTORE_PATH" \
              -storepass "$AW_ANDROID_KEYSTORE_PASSWORD" \
              -keypass "$candidate" \
              "$PROBE_DIR/probe.jar" \
              "$AW_ANDROID_KEY_ALIAS" >/dev/null 2>&1
          }

          if [ -n "${AW_ANDROID_KEY_PASSWORD:-}" ] && try_sign "$AW_ANDROID_KEY_PASSWORD"; then
            RESOLVED_KEY_PASSWORD="$AW_ANDROID_KEY_PASSWORD"
            echo "[OK] Private key password secret is valid."
          elif try_sign "$AW_ANDROID_KEYSTORE_PASSWORD"; then
            RESOLVED_KEY_PASSWORD="$AW_ANDROID_KEYSTORE_PASSWORD"
            echo "[WARN] Private key password secret was empty or invalid; falling back to keystore password because that one signs successfully."
          else
            echo "[ERROR] Neither AW_ANDROID_KEY_PASSWORD nor AW_ANDROID_KEYSTORE_PASSWORD could unlock alias '$AW_ANDROID_KEY_ALIAS'." >&2
            exit 1
          fi

          printf 'RESOLVED_AW_ANDROID_KEY_PASSWORD=%s\n' "$RESOLVED_KEY_PASSWORD" >> "$GITHUB_ENV"

      - name: Write key.properties
        shell: bash
        env:
          AW_ANDROID_KEYSTORE_PASSWORD: ${{ secrets.AW_ANDROID_KEYSTORE_PASSWORD }}
          AW_ANDROID_KEY_ALIAS: ${{ secrets.AW_ANDROID_KEY_ALIAS }}
        run: |
          cat > "$BUILD_ROOT/android/key.properties" <<EOF
          storePassword=${AW_ANDROID_KEYSTORE_PASSWORD}
          keyPassword=${RESOLVED_AW_ANDROID_KEY_PASSWORD}
          keyAlias=${AW_ANDROID_KEY_ALIAS}
          storeFile=${RUNNER_TEMP}/alphawet-signing/release.jks
          EOF

      - name: Wire release signing into generated Android project
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import os

          app_dir = Path(os.environ["BUILD_ROOT"]) / "android" / "app"
          kts = app_dir / "build.gradle.kts"
          groovy = app_dir / "build.gradle"

          def patch_kts(path: Path):
              text = path.read_text()

              if 'val keystoreProperties = Properties()' not in text:
                  marker = 'plugins {'
                  inject = '''import java.util.Properties
          import java.io.FileInputStream

          val keystoreProperties = Properties()
          val keystorePropertiesFile = rootProject.file("key.properties")
          if (keystorePropertiesFile.exists()) {
              keystoreProperties.load(FileInputStream(keystorePropertiesFile))
          }

          plugins {'''
                  text = text.replace(marker, inject, 1)

              if 'create("release")' not in text:
                  text = text.replace(
                      'buildTypes {',
                      '''signingConfigs {
                  create("release") {
                      keyAlias = keystoreProperties["keyAlias"] as String
                      keyPassword = keystoreProperties["keyPassword"] as String
                      storeFile = keystoreProperties["storeFile"]?.let { file(it) }
                      storePassword = keystoreProperties["storePassword"] as String
                  }
              }

              buildTypes {''',
                      1
                  )

              text = text.replace(
                  'signingConfig = signingConfigs.getByName("debug")',
                  'signingConfig = signingConfigs.getByName("release")'
              )

              if 'signingConfig = signingConfigs.getByName("release")' not in text:
                  text = text.replace(
                      'release {',
                      'release {\n            signingConfig = signingConfigs.getByName("release")',
                      1
                  )

              path.write_text(text)

          def patch_groovy(path: Path):
              text = path.read_text()

              if "def keystoreProperties = new Properties()" not in text:
                  marker = 'plugins {'
                  inject = """import java.util.Properties
          import java.io.FileInputStream

          def keystoreProperties = new Properties()
          def keystorePropertiesFile = rootProject.file('key.properties')
          if (keystorePropertiesFile.exists()) {
              keystoreProperties.load(new FileInputStream(keystorePropertiesFile))
          }

          plugins {"""
                  text = text.replace(marker, inject, 1)

              if "signingConfigs {" not in text or "release {" not in text:
                  text = text.replace(
                      'buildTypes {',
                      """signingConfigs {
                  release {
                      keyAlias = keystoreProperties['keyAlias']
                      keyPassword = keystoreProperties['keyPassword']
                      storeFile = keystoreProperties['storeFile'] ? file(keystoreProperties['storeFile']) : null
                      storePassword = keystoreProperties['storePassword']
                  }
              }

              buildTypes {""",
                      1
                  )

              text = text.replace(
                  'signingConfig = signingConfigs.debug',
                  'signingConfig = signingConfigs.release'
              )

              if 'signingConfig = signingConfigs.release' not in text:
                  text = text.replace(
                      'release {',
                      'release {\n            signingConfig = signingConfigs.release',
                      1
                  )

              path.write_text(text)

          if kts.exists():
              patch_kts(kts)
          elif groovy.exists():
              patch_groovy(groovy)
          else:
              raise SystemExit("No app build.gradle(.kts) found in generated Android project")
          PY

      - name: Install dependencies
        working-directory: ${{ env.BUILD_ROOT }}
        run: flutter pub get

      - name: Run tests
        working-directory: ${{ env.BUILD_ROOT }}
        run: flutter test

      - name: Static analysis
        working-directory: ${{ env.BUILD_ROOT }}
        run: flutter analyze

      - name: Compose optional dart-define flags
        env:
          AW_TRANSPORT_KEY_BASE64: ${{ secrets.AW_TRANSPORT_KEY_BASE64 }}
          AW_ED25519_PUBLIC_KEY_BASE64: ${{ secrets.AW_ED25519_PUBLIC_KEY_BASE64 }}
          AW_ALLOW_LEGACY_PLAINTEXT_IMPORT: ${{ secrets.AW_ALLOW_LEGACY_PLAINTEXT_IMPORT }}
        run: |
          args=()
          [ -n "${AW_TRANSPORT_KEY_BASE64:-}" ] && args+=("--dart-define=AW_TRANSPORT_KEY_BASE64=${AW_TRANSPORT_KEY_BASE64}")
          [ -n "${AW_ED25519_PUBLIC_KEY_BASE64:-}" ] && args+=("--dart-define=AW_ED25519_PUBLIC_KEY_BASE64=${AW_ED25519_PUBLIC_KEY_BASE64}")
          [ -n "${AW_ALLOW_LEGACY_PLAINTEXT_IMPORT:-}" ] && args+=("--dart-define=AW_ALLOW_LEGACY_PLAINTEXT_IMPORT=${AW_ALLOW_LEGACY_PLAINTEXT_IMPORT}")
          printf 'DART_DEFINE_ARGS=%s\n' "${args[*]}" >> "$GITHUB_ENV"

      - name: Build universal release APK
        working-directory: ${{ env.BUILD_ROOT }}
        run: flutter build apk --release --obfuscate --split-debug-info=build/symbols ${DART_DEFINE_ARGS}

      - name: Verify release certificate pin
        shell: bash
        env:
          AW_EXPECTED_SIGNING_CERT_SHA256: ${{ secrets.AW_EXPECTED_SIGNING_CERT_SHA256 }}
        run: |
          APKSIGNER="$(find "${ANDROID_HOME}" -type f -name apksigner | sort -V | tail -n 1)"
          test -n "$APKSIGNER"
          ACTUAL_CERT_SHA256="$($APKSIGNER verify --print-certs "$BUILD_ROOT/build/app/outputs/flutter-apk/app-release.apk" | sed -n 's/^Signer #1 certificate SHA-256 digest: //p' | tr -d ':\r\n ')"
          echo "Actual cert SHA256: $ACTUAL_CERT_SHA256"
          test -n "$ACTUAL_CERT_SHA256"
          test "$ACTUAL_CERT_SHA256" = "$AW_EXPECTED_SIGNING_CERT_SHA256"

      - name: Collect build outputs
        run: |
          mkdir -p dist
          cp "$BUILD_ROOT/build/app/outputs/flutter-apk/app-release.apk" \
            dist/alphawet-universal-release.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: alphawet-universal-apk
          path: dist/alphawet-universal-release.apk
          if-no-files-found: error
