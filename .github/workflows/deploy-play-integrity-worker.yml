name: Deploy AlphaWet Play Integrity worker

on:
  workflow_dispatch:
    inputs:
      worker_name:
        description: Cloudflare Worker name
        required: true
        default: alphawet-play-integrity
      expected_cert_sha256:
        description: Release signing cert SHA-256 uppercase
        required: true
      expected_package_name:
        description: Android package name
        required: true
        default: ir.alphacraft.alphawet

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: cloudflare-worker
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install

      - name: Override worker name from workflow input
        run: |
          node - <<'NODE'
          const fs = require('fs');
          const path = 'wrangler.toml';
          const text = fs.readFileSync(path, 'utf8');
          fs.writeFileSync(
            path,
            text.replace(/^name = ".*"$/m, `name = "${process.env.WORKER_NAME}"`),
          );
          NODE
        env:
          WORKER_NAME: ${{ inputs.worker_name }}

      - name: Configure Worker runtime vars
        run: |
          node - <<'NODE'
          const fs = require('fs');
          const path = 'wrangler.toml';
          const text = fs.readFileSync(path, 'utf8');
          const varsBlock = `

[vars]
ALPHAWET_EXPECTED_PACKAGE_NAME = "${process.env.ALPHAWET_EXPECTED_PACKAGE_NAME}"
ALPHAWET_REQUIRED_DEVICE_LABEL = "${process.env.ALPHAWET_REQUIRED_DEVICE_LABEL}"
ALPHAWET_EXPECTED_CERT_SHA256 = "${process.env.ALPHAWET_EXPECTED_CERT_SHA256}"
ALPHAWET_MAX_TOKEN_AGE_MS = "${process.env.ALPHAWET_MAX_TOKEN_AGE_MS}"
ALPHAWET_REQUIRE_PLAY_RECOGNIZED = "${process.env.ALPHAWET_REQUIRE_PLAY_RECOGNIZED}"
GCP_TOKEN_URI = "${process.env.GCP_TOKEN_URI}"
`;
          fs.writeFileSync(path, text.replace(/\s*$/, '') + varsBlock + '\n');
          NODE
        env:
          ALPHAWET_EXPECTED_PACKAGE_NAME: ${{ inputs.expected_package_name }}
          ALPHAWET_REQUIRED_DEVICE_LABEL: MEETS_DEVICE_INTEGRITY
          ALPHAWET_EXPECTED_CERT_SHA256: ${{ inputs.expected_cert_sha256 }}
          ALPHAWET_MAX_TOKEN_AGE_MS: '120000'
          ALPHAWET_REQUIRE_PLAY_RECOGNIZED: 'true'
          GCP_TOKEN_URI: ${{ secrets.GCP_TOKEN_URI }}

      - name: Upload Worker secrets
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          GCP_SERVICE_ACCOUNT_EMAIL: ${{ secrets.GCP_SERVICE_ACCOUNT_EMAIL }}
          GCP_SERVICE_ACCOUNT_PRIVATE_KEY: ${{ secrets.GCP_SERVICE_ACCOUNT_PRIVATE_KEY }}
        run: |
          node - <<'NODE' > /tmp/alphawet-worker-secrets.json
          process.stdout.write(JSON.stringify({
            GCP_SERVICE_ACCOUNT_EMAIL: process.env.GCP_SERVICE_ACCOUNT_EMAIL,
            GCP_SERVICE_ACCOUNT_PRIVATE_KEY: process.env.GCP_SERVICE_ACCOUNT_PRIVATE_KEY,
          }));
          NODE
          npx wrangler secret bulk /tmp/alphawet-worker-secrets.json

      - name: Publish Worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler deploy
